<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | EasyCarHireNaija</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="auth-container p-3">
        <div class="auth-card shadow-lg text-center">
            <h2 class="fw-bold mb-4">Easy<span class="text-primary">CarHireNaija</span></h2>
            <h5 class="mb-4">Create Your Account</h5>
            
            <!-- Signup Form -->
            <form id="signupForm" class="text-start">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control rounded-pill" id="nameInput" placeholder="Full Name" required>
                    <label for="nameInput">Full Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control rounded-pill" id="emailInput" placeholder="name@example.com" required>
                    <label for="emailInput">Email address</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control rounded-pill" id="passwordInput" placeholder="Password" required>
                    <label for="passwordInput">Password</label>
                </div>
                <button type="submit" class="btn btn-dark w-100 rounded-pill py-3 fw-bold">Sign Up</button>
            </form>

            <div class="mt-4">
                <p class="text-muted small">Already have an account? <a href="login.html" class="text-primary text-decoration-none">Sign in</a></p>
                <a href="index.html" class="text-muted small text-decoration-none border-bottom">Back to Gallery</a>
            </div>
        </div>
    </div>

    <!-- Auth JS -->
    <script src="js/auth.js"></script>
</body>
</html>
